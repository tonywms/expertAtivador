<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Expert - Portal de Licenciamento</title>
    
    <!-- Ícone -->
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="shortcut icon" type="image/png" href="/icon.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0d1117;
            color: #f0f6fc;
            min-height: 100vh;
            padding: 1rem;
        }

        @media (min-width: 768px) {
            body {
                padding: 3rem;
            }
        }

        .container {
            max-width: 32rem;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            width: 100%;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 0.75rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.875rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            color: #6b7280;
            margin-bottom: 0.5rem;
            font-family: monospace;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 0.5rem;
            color: #f0f6fc;
            font-family: monospace;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            ring: 2px solid #3b82f6;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .form-group input::placeholder {
            color: #6b7280;
        }

        .info-box {
            background-color: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 0.75rem;
            border-radius: 0.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .info-box p {
            font-size: 0.625rem;
            color: #60a5fa;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            font-weight: 900;
            padding: 1rem;
            border-radius: 0.5rem;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }

        button:hover:not(:disabled) {
            background-color: #3b82f6;
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            margin-top: 2.5rem;
            padding: 1.5rem;
            background-color: rgba(59, 130, 246, 0.05);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 0.75rem;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .result-label {
            font-size: 0.625rem;
            color: #60a5fa;
            text-transform: uppercase;
            font-weight: 900;
            text-align: center;
            margin-bottom: 0.75rem;
            letter-spacing: 0.1em;
        }

        .chave-box {
            background-color: #0d1117;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #30363d;
            position: relative;
        }

        .chave-text {
            font-size: 1.25rem;
            font-family: monospace;
            text-align: center;
            color: white;
            word-break: break-all;
            font-weight: 700;
            user-select: all;
        }

        .copy-btn {
            width: 100%;
            background: none;
            border: none;
            color: #6b7280;
            font-size: 0.6875rem;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            padding: 0.5rem;
            box-shadow: none;
        }

        .copy-btn:hover {
            color: white;
            transform: none;
            background: none;
        }

        footer {
            margin-top: 2rem;
            color: #4b5563;
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1 style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                    <img src="/icon.png" alt="WMS Expert" style="width: 32px; height: 32px; vertical-align: middle;">
                    WMS Expert
                </h1>
                <p>Portal Interno de Licenciamento</p>
            </div>

            <form id="formGerador">
                <div class="form-group">
                    <label>Código de Ativação</label>
                    <input 
                        type="text" 
                        id="hwid"
                        placeholder="Ex: WJMLMDVW-XXXX-XXXX"
                        required
                        autocomplete="off"
                    >
                </div>

                <div class="form-group">
                    <label>CNPJ Cliente (Opcional)</label>
                    <input 
                        type="text" 
                        id="cnpj"
                        placeholder="00.000.000/0001-00"
                        autocomplete="off"
                    >
                </div>

                <div class="info-box">
                    <p>WMS Expert agrade a preferência.</p>
                </div>

                <button type="submit" id="btnGerar">
                    Gerar Chave de Acesso
                </button>
            </form>

            <div id="resultado" style="display: none;"></div>
        </div>

        <footer>
            Uso Restrito - WMS Expert Support Team
        </footer>
    </div>

    <script>
        // Máscara para CNPJ
        document.getElementById('cnpj').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 14) value = value.slice(0, 14);
            if (value.length >= 2) value = value.replace(/^(\d{2})(\d)/, '$1.$2');
            if (value.length >= 6) value = value.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
            if (value.length >= 10) value = value.replace(/\.(\d{3})(\d)/, '.$1/$2');
            if (value.length >= 15) value = value.replace(/(\d{4})(\d)/, '$1-$2');
            e.target.value = value;
        });

        // Converter para maiúsculas no HWID
        document.getElementById('hwid').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase().trim();
        });

        // Formatar data para DD/MM/AAAA (data atual + 60 dias)
        function getDataExpiracao() {
            const data = new Date();
            data.setDate(data.getDate() + 60);
            const dia = String(data.getDate()).padStart(2, '0');
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const ano = data.getFullYear();
            return `${dia}/${mes}/${ano}`;
        }

        // Função para gerar chave
        async function gerarChave(hwid, cnpj) {
            const validade = getDataExpiracao();
            const params = new URLSearchParams({
                hwid: hwid,
                validade: validade,
                cnpj: cnpj || ''
            });

            const response = await fetch(`/api/gerar?${params.toString()}`);
            const data = await response.json();
            return data;
        }

        // Form submit
        document.getElementById('formGerador').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const hwid = document.getElementById('hwid').value;
            const cnpj = document.getElementById('cnpj').value;
            const btn = document.getElementById('btnGerar');
            const resultadoDiv = document.getElementById('resultado');
            
            // Validação básica
            if (!hwid || hwid.length < 9) {
                alert('HWID inválido! Deve conter no mínimo 9 caracteres e hífen.');
                return;
            }

            if (!hwid.includes('-')) {
                alert('HWID inválido! Deve conter um hífen (-). Ex: WJMLMDVW-XXXX');
                return;
            }

            // Mostrar loading
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Gerando...';
            resultadoDiv.style.display = 'none';

            try {
                const data = await gerarChave(hwid, cnpj);
                
                if (data.sucesso && data.chave_gerada) {
                    // Mostrar chave gerada
                    resultadoDiv.innerHTML = `
                        <div class="result">
                            <div class="result-label">Chave de Registro</div>
                            <div class="chave-box">
                                <div class="chave-text">${data.chave_gerada}</div>
                            </div>
                            <button class="copy-btn" onclick="copiarChave('${data.chave_gerada}')">
                                Clique aqui para copiar a chave
                            </button>
                        </div>
                    `;
                    resultadoDiv.style.display = 'block';
                } else {
                    alert(data.error || 'Erro ao gerar chave. Verifique o HWID.');
                }
            } catch (err) {
                alert('Erro ao conectar com o servidor de chaves.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Gerar Chave de Acesso';
            }
        });

        // Função para copiar chave
        function copiarChave(chave) {
            navigator.clipboard.writeText(chave).then(() => {
                alert('Chave copiada com sucesso!');
            }).catch(() => {
                alert('Erro ao copiar. Selecione manualmente.');
            });
        }
    </script>
</body>
</html>
